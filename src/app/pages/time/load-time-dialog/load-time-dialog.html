<h2 mat-dialog-title>Cargar Tiempo Manual</h2>

<mat-dialog-content [formGroup]="timeForm">
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Seleccionar Pedido</mat-label>
    <input type="text" placeholder="Busca un pedido" aria-label="Pedido" matInput [formControl]="orderCtrl"
      [matAutocomplete]="auto">
    <mat-autocomplete #auto="matAutocomplete" [displayWith]="displayFn">
      <mat-option *ngFor="let order of filteredOrders" [value]="order">
        {{order.title}} (ID: {{order.id}})
      </mat-option>
    </mat-autocomplete>
  </mat-form-field>

  <div class="task-type-container">
    <mat-form-field appearance="outline" class="flex-grow">
      <mat-label>Tipo de Tarea</mat-label>
      <input type="text" placeholder="Busca un tipo de tarea" aria-label="Tipo de Tarea" matInput [formControl]="taskTypeCtrl" [matAutocomplete]="taskTypeAuto">
      <mat-autocomplete #taskTypeAuto="matAutocomplete" [displayWith]="displayTaskTypeFn">
        <mat-option *ngFor="let type of filteredTaskTypes" [value]="type">
          {{type.name}}
        </mat-option>
      </mat-autocomplete>
    </mat-form-field>
    <button mat-icon-button color="primary" class="add-task-type-btn" (click)="openTaskTypeDialog()" matTooltip="Crear nuevo tipo de tarea">
      <mat-icon>add</mat-icon>
    </button>
  </div>

  <div class="time-inputs">
    <mat-form-field appearance="outline" class="flex-grow">
      <mat-label>Cantidad de Tiempo</mat-label>
      <input type="number" matInput formControlName="timeValue" min="0" step="0.5">
    </mat-form-field>

    <mat-form-field appearance="outline" class="unit-select">
      <mat-label>Unidad</mat-label>
      <mat-select formControlName="timeUnit">
        <mat-option value="minutos">Minutos</mat-option>
        <mat-option value="hs">Horas</mat-option>
      </mat-select>
    </mat-form-field>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="onSave()" [disabled]="timeForm.invalid">Guardar</button>
</mat-dialog-actions>
