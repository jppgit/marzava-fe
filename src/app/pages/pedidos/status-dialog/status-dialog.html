<h2 mat-dialog-title class="dialog-title">
  <mat-icon class="title-icon">edit_note</mat-icon>
  Editar Estado
</h2>

<mat-dialog-content class="dialog-content">
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="status-field">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status" id="status-select">
        <mat-option *ngFor="let s of statuses" [value]="s.value">
          <span class="status-option" [attr.data-status]="s.value">
            {{ s.label }}
          </span>
        </mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('status')?.hasError('required')">
        Status is required
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button class="cancel-btn" (click)="onCancel()" id="status-cancel-btn">
    Cancelar
  </button>
  <button mat-raised-button color="primary" class="save-btn" (click)="onSave()" [disabled]="form.invalid" id="status-save-btn">
    <mat-icon>save</mat-icon>
    Guardar
  </button>
</mat-dialog-actions>
