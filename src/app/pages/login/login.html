<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Iniciar Sesión</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuario</mat-label>
          <input matInput formControlName="username" placeholder="Usuario" type="text" required>
          <mat-error *ngIf="form.get('username')?.hasError('required')">El usuario es requerido</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput formControlName="password" placeholder="Contraseña" type="password" required>
          <mat-error *ngIf="form.get('password')?.hasError('required')">La contraseña es requerida</mat-error>
        </mat-form-field>
        
        <div *ngIf="error" class="error-message">
          {{ error }}
        </div>
        
        <button mat-raised-button color="primary" class="full-width" type="submit" [disabled]="!form.valid">Ingresar</button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
