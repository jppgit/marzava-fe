<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport
      [attr.role]="'navigation'"
      [mode]="'side'"
      [opened]="true">
    <mat-toolbar>Menú</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/home" routerLinkActive="active-link">
        <mat-icon matListItemIcon>home</mat-icon>
        <span matListItemTitle>Home</span>
      </a>
      <a mat-list-item routerLink="/clientes" routerLinkActive="active-link">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>Clientes</span>
      </a>
      <a mat-list-item routerLink="/pedidos" routerLinkActive="active-link">
        <mat-icon matListItemIcon>shopping_cart</mat-icon>
        <span matListItemTitle>Pedidos</span>
      </a>
      <a mat-list-item routerLink="/order-types" routerLinkActive="active-link">
        <mat-icon matListItemIcon>category</mat-icon>
        <span matListItemTitle>Tipos de Orden</span>
      </a>
      <a mat-list-item routerLink="/costos" routerLinkActive="active-link">
        <mat-icon matListItemIcon>attach_money</mat-icon>
        <span matListItemTitle>Costos</span>
      </a>
      <a mat-list-item routerLink="/time" routerLinkActive="active-link">
        <mat-icon matListItemIcon>access_time</mat-icon>
        <span matListItemTitle>Tiempo</span>
      </a>
      <a mat-list-item routerLink="/tareas" routerLinkActive="active-link">
        <mat-icon matListItemIcon>task</mat-icon>
        <span matListItemTitle>Tareas</span>
      </a>



    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="drawer.toggle()">
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
      <span>Marzava App</span>
      <span class="spacer"></span>
      <button mat-icon-button aria-label="Logout" (click)="onLogout()">
        <mat-icon>exit_to_app</mat-icon>
      </button>

    </mat-toolbar>
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
